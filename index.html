<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLE Crowd Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .lift-card {
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .lift-card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 22px 45px rgba(0, 0, 0, 0.14),
                0 8px 18px rgba(0, 0, 0, 0.08);
        }

        .glass-panel {
            background: linear-gradient(145deg, rgba(255,255,255,0.96), rgba(243,244,246,0.92));
            box-shadow:
                0 14px 32px rgba(15, 23, 42, 0.10),
                0 4px 12px rgba(15, 23, 42, 0.06),
                inset 0 1px 0 rgba(255,255,255,0.85);
        }

        .insight-panel {
            background: linear-gradient(145deg, #ffffff, #f3f4f6);
            box-shadow:
                0 10px 24px rgba(15, 23, 42, 0.08),
                inset 0 1px 0 rgba(255,255,255,0.95);
        }
    </style>
</head>
<body class="p-8 text-gray-800 bg-gradient-to-br from-gray-100 via-gray-50 to-gray-200 min-h-screen">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Room Activity Monitor</h1>
                <p class="text-gray-500 text-sm mt-1">CREATE-X Live Crowd Estimation via BLE</p>
            </div>
            <div id="status-badge" class="px-4 py-2 rounded-full text-sm font-semibold bg-green-100 text-green-800 transition-colors duration-300 shadow-md">
                Status: Quiet
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="lift-card glass-panel rounded-2xl p-6 border border-white/70">
                <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Estimated People</h2>
                <div class="mt-2 flex items-baseline gap-2">
                    <span id="est-people" class="text-5xl font-extrabold text-blue-600">0</span>
                    <span class="text-gray-400 text-sm">individuals</span>
                </div>
            </div>

            <div class="lift-card glass-panel rounded-2xl p-6 border border-white/70">
                <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Raw BLE Signals</h2>
                <div class="mt-2 flex items-baseline gap-2">
                    <span id="raw-signals" class="text-4xl font-bold text-gray-700">0</span>
                    <span class="text-gray-400 text-sm">devices</span>
                </div>
            </div>

            <div class="lift-card glass-panel rounded-2xl p-6 border border-white/70">
                <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider">Room Capacity</h2>
                <div class="mt-2 flex items-baseline gap-2">
                    <span id="capacity-pct" class="text-4xl font-bold text-gray-700">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5 mt-4 shadow-inner">
                    <div id="capacity-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="chart-card" class="lift-card glass-panel rounded-2xl p-6 border border-white/70">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold text-gray-800">Crowd Density Over Time</h2>
                <button
                    onclick="clearHistory()"
                    class="px-3 py-2 text-sm font-medium rounded-lg bg-white/80 text-gray-700 border border-gray-200 shadow-sm hover:bg-white"
                >
                    Clear History
                </button>
            </div>

            <div class="relative h-72 w-full">
                <canvas id="crowdChart"></canvas>
            </div>

            <div id="insights-grid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
                <div class="lift-card insight-panel rounded-2xl p-4 border border-white/80">
                    <div class="text-xs uppercase tracking-wide text-gray-500 font-semibold">Average</div>
                    <div id="insight-average" class="text-2xl font-bold text-gray-800 mt-1">0</div>
                    <div class="text-sm text-gray-500">people over saved history</div>
                </div>

                <div class="lift-card insight-panel rounded-2xl p-4 border border-white/80">
                    <div class="text-xs uppercase tracking-wide text-gray-500 font-semibold">Peak</div>
                    <div id="insight-peak" class="text-2xl font-bold text-gray-800 mt-1">0</div>
                    <div id="insight-peak-time" class="text-sm text-gray-500">No peak yet</div>
                </div>

                <div class="lift-card insight-panel rounded-2xl p-4 border border-white/80">
                    <div class="text-xs uppercase tracking-wide text-gray-500 font-semibold">Trend</div>
                    <div id="insight-trend" class="text-2xl font-bold text-gray-800 mt-1">Stable</div>
                    <div class="text-sm text-gray-500">based on recent readings</div>
                </div>
            </div>
        </div>
    </div>

<script>
    const ROOM_CAPACITY = 100;
    const STATIC_DEVICES = 12;
    const DEVICE_MULTIPLIER = 1.5;

    const STORAGE_KEY = "bleCrowdHistory";
    const MAX_SAVED_POINTS = 500;
    const MAX_CHART_POINTS = 30;
    const SEEDED_POINTS = 24;

    const elEstPeople = document.getElementById('est-people');
    const elRawSignals = document.getElementById('raw-signals');
    const elCapacityPct = document.getElementById('capacity-pct');
    const elCapacityBar = document.getElementById('capacity-bar');
    const elStatusBadge = document.getElementById('status-badge');

    const elInsightAverage = document.getElementById('insight-average');
    const elInsightPeak = document.getElementById('insight-peak');
    const elInsightPeakTime = document.getElementById('insight-peak-time');
    const elInsightTrend = document.getElementById('insight-trend');

    let historyData = loadHistory();

    const ctx = document.getElementById('crowdChart').getContext('2d');
    const crowdChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Estimated People',
                data: [],
                borderColor: 'rgb(37, 99, 235)',
                backgroundColor: 'rgba(37, 99, 235, 0.12)',
                borderWidth: 3,
                pointRadius: 3,
                pointHoverRadius: 5,
                fill: true,
                tension: 0.35
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: {
                    beginAtZero: true,
                    suggestedMax: ROOM_CAPACITY,
                    title: {
                        display: true,
                        text: 'Estimated People'
                    },
                    grid: {
                        color: 'rgba(148, 163, 184, 0.18)'
                    }
                },
                x: {
                    display: true,
                    title: {
                        display: true,
                        text: 'Time'
                    },
                    ticks: {
                        maxRotation: 45,
                        minRotation: 45
                    },
                    grid: {
                        color: 'rgba(148, 163, 184, 0.10)'
                    }
                }
            },
            plugins: {
                legend: {
                    display: false
                }
            }
        }
    });

    function loadHistory() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) return [];
            const parsed = JSON.parse(saved);
            return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
            console.error("Failed to load history:", error);
            return [];
        }
    }

    function saveHistory() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(historyData));
        } catch (error) {
            console.error("Failed to save history:", error);
        }
    }

    function calculateMetrics(rawBleCount) {
        const activeDevices = Math.max(0, rawBleCount - STATIC_DEVICES);
        const estimatedPeople = Math.round(activeDevices / DEVICE_MULTIPLIER);
        const capacityPct = Math.min(100, Math.round((estimatedPeople / ROOM_CAPACITY) * 100));

        return {
            rawBleCount,
            estimatedPeople,
            capacityPct
        };
    }

    function setStatus(capacityPct) {
        if (capacityPct >= 90) {
            elStatusBadge.className = "px-4 py-2 rounded-full text-sm font-semibold bg-red-100 text-red-800 transition-colors duration-300 shadow-md";
            elStatusBadge.innerText = "Status: Overcrowded";
            elCapacityBar.className = "bg-red-600 h-2.5 rounded-full transition-all duration-500 shadow-sm";
        } else if (capacityPct >= 60) {
            elStatusBadge.className = "px-4 py-2 rounded-full text-sm font-semibold bg-yellow-100 text-yellow-800 transition-colors duration-300 shadow-md";
            elStatusBadge.innerText = "Status: Active";
            elCapacityBar.className = "bg-yellow-500 h-2.5 rounded-full transition-all duration-500 shadow-sm";
        } else {
            elStatusBadge.className = "px-4 py-2 rounded-full text-sm font-semibold bg-green-100 text-green-800 transition-colors duration-300 shadow-md";
            elStatusBadge.innerText = "Status: Quiet";
            elCapacityBar.className = "bg-blue-600 h-2.5 rounded-full transition-all duration-500 shadow-sm";
        }
    }

    function updateKpis(metrics) {
        elRawSignals.innerText = metrics.rawBleCount;
        elEstPeople.innerText = metrics.estimatedPeople;
        elCapacityPct.innerText = `${metrics.capacityPct}%`;
        elCapacityBar.style.width = `${metrics.capacityPct}%`;
        setStatus(metrics.capacityPct);
    }

    function redrawChartFromHistory() {
        const recentHistory = historyData.slice(-MAX_CHART_POINTS);
        crowdChart.data.labels = recentHistory.map(point => point.timeLabel);
        crowdChart.data.datasets[0].data = recentHistory.map(point => point.estimatedPeople);
        crowdChart.update();
    }

    function updateInsights() {
        if (historyData.length === 0) {
            elInsightAverage.innerText = "0";
            elInsightPeak.innerText = "0";
            elInsightPeakTime.innerText = "No peak yet";
            elInsightTrend.innerText = "Stable";
            return;
        }

        const total = historyData.reduce((sum, point) => sum + point.estimatedPeople, 0);
        const average = Math.round(total / historyData.length);

        let peakPoint = historyData[0];
        for (const point of historyData) {
            if (point.estimatedPeople > peakPoint.estimatedPeople) {
                peakPoint = point;
            }
        }

        const recent = historyData.slice(-5);
        let trendText = "Stable";

        if (recent.length >= 2) {
            const first = recent[0].estimatedPeople;
            const last = recent[recent.length - 1].estimatedPeople;

            if (last - first >= 8) {
                trendText = "Rising";
            } else if (first - last >= 8) {
                trendText = "Falling";
            }
        }

        elInsightAverage.innerText = average;
        elInsightPeak.innerText = peakPoint.estimatedPeople;
        elInsightPeakTime.innerText = `Peak at ${peakPoint.timeLabel}`;
        elInsightTrend.innerText = trendText;
    }

    function appendNewReading(rawBleCount, customDate = null) {
        const metrics = calculateMetrics(rawBleCount);
        const now = customDate || new Date();

        const point = {
            timestamp: now.toISOString(),
            timeLabel: now.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            }),
            rawBleCount: metrics.rawBleCount,
            estimatedPeople: metrics.estimatedPeople,
            capacityPct: metrics.capacityPct
        };

        historyData.push(point);

        if (historyData.length > MAX_SAVED_POINTS) {
            historyData = historyData.slice(-MAX_SAVED_POINTS);
        }

        saveHistory();
        updateKpis(metrics);
        redrawChartFromHistory();
        updateInsights();
    }

    function seedInitialHistory() {
        if (historyData.length > 0) return;

        const now = new Date();
        let lastRaw = 72;

        for (let i = SEEDED_POINTS; i > 0; i--) {
            const pointTime = new Date(now.getTime() - i * 3 * 60 * 1000);

            const change = Math.floor(Math.random() * 11) - 5;
            lastRaw = Math.max(35, Math.min(120, lastRaw + change));

            const metrics = calculateMetrics(lastRaw);

            historyData.push({
                timestamp: pointTime.toISOString(),
                timeLabel: pointTime.toLocaleTimeString([], {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                }),
                rawBleCount: metrics.rawBleCount,
                estimatedPeople: metrics.estimatedPeople,
                capacityPct: metrics.capacityPct
            });
        }

        saveHistory();
    }

    function restoreDashboard() {
        if (historyData.length === 0) return;

        const latest = historyData[historyData.length - 1];
        updateKpis({
            rawBleCount: latest.rawBleCount,
            estimatedPeople: latest.estimatedPeople,
            capacityPct: latest.capacityPct
        });

        redrawChartFromHistory();
        updateInsights();
    }

    function clearHistory() {
        historyData = [];
        localStorage.removeItem(STORAGE_KEY);
        crowdChart.data.labels = [];
        crowdChart.data.datasets[0].data = [];
        crowdChart.update();

        elRawSignals.innerText = "0";
        elEstPeople.innerText = "0";
        elCapacityPct.innerText = "0%";
        elCapacityBar.style.width = "0%";
        setStatus(0);
        updateInsights();
    }

    seedInitialHistory();
    restoreDashboard();

    setInterval(() => {
        const lastRaw = historyData.length > 0 ? historyData[historyData.length - 1].rawBleCount : 72;
        const change = Math.floor(Math.random() * 9) - 4;
        const nextRaw = Math.max(35, Math.min(120, lastRaw + change));
        appendNewReading(nextRaw);
    }, 3000);

    window.clearHistory = clearHistory;

    /*
    Replace demo mode later with real backend data:

    setInterval(async () => {
        const response = await fetch('http://your-pi-ip:5000/api/count');
        const data = await response.json();
        appendNewReading(data.raw_ble_count);
    }, 5000);
    */
</script>
</body>
</html>
